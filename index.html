<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Restaurant AI Toolkit</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --primary: #FF6B35;
      --primary-dark: #E55A2B;
      --secondary: #1A1A2E;
      --accent: #16213E;
      --light: #F7F7F7;
      --white: #FFFFFF;
      --gray: #6B7280;
      --success: #10B981;
      --border: #E5E7EB;
    }
    html, body { height: 100%; }
    body { 
      font-family: 'Inter', sans-serif; 
      background: linear-gradient(135deg, var(--secondary) 0%, var(--accent) 100%);
      color: var(--secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    
    .container {
      background: var(--white);
      border-radius: 24px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-icon {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }
    .logo-text {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--secondary);
    }
    .logo-text span { color: var(--primary); }
    .logo-subtitle {
      color: var(--gray);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }
    
    .tabs {
      display: flex;
      margin-bottom: 1.5rem;
      background: var(--light);
      border-radius: 12px;
      padding: 4px;
    }
    .tab {
      flex: 1;
      padding: 0.75rem;
      border: none;
      background: none;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--gray);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--white);
      color: var(--primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .form { display: none; }
    .form.active { display: block; }
    
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-weight: 500;
      font-size: 0.85rem;
      margin-bottom: 0.4rem;
      color: var(--secondary);
    }
    .form-group input {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .btn {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--primary);
      color: var(--white);
    }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:active { transform: scale(0.98); }
    
    .error {
      background: #FEE2E2;
      color: #DC2626;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .error.show { display: block; }
    
    .divider {
      text-align: center;
      margin: 1.5rem 0;
      color: var(--gray);
      font-size: 0.85rem;
      position: relative;
    }
    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    
    .features {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .features-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--gray);
      margin-bottom: 0.75rem;
    }
    .feature {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0;
      font-size: 0.9rem;
    }
    .feature-icon { font-size: 1.25rem; }
    
    .loading {
      display: none;
      text-align: center;
      padding: 1rem;
    }
    .loading.show { display: block; }
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">🍽️</div>
      <div class="logo-text"><span>Restaurant</span> AI</div>
      <div class="logo-subtitle">AI-Powered Marketing for Restaurants</div>
    </div>
    
    <div class="error" id="error"></div>
    
    <div class="tabs">
      <button class="tab active" data-tab="login">Sign In</button>
      <button class="tab" data-tab="signup">Sign Up</button>
    </div>
    
    <!-- Login Form -->
    <form id="login-form" class="form active">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@restaurant.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" id="login-btn">Sign In</button>
      <div class="loading" id="login-loading">
        <div class="spinner"></div>
        <div>Signing in...</div>
      </div>
    </form>
    
    <!-- Signup Form -->
    <form id="signup-form" class="form">
      <div class="form-group">
        <label>Restaurant Name</label>
        <input type="text" id="signup-restaurant" placeholder="e.g., Joe's Pizza" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@restaurant.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Create a password" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary" id="signup-btn">Start Free Trial</button>
      <div class="loading" id="signup-loading">
        <div class="spinner"></div>
        <div>Creating account...</div>
      </div>
    </form>
    
    <div class="features">
      <div class="features-title">What's Included</div>
      <div class="feature"><span class="feature-icon">📋</span> Job Post Generator</div>
      <div class="feature"><span class="feature-icon">⭐</span> Review Response</div>
      <div class="feature"><span class="feature-icon">📱</span> Social Media Posts</div>
      <div class="feature"><span class="feature-icon">🍜</span> Menu Descriptions</div>
      <div class="feature"><span class="feature-icon">✉️</span> Email Marketing</div>
    </div>
  </div>

  <script>
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + '-form').classList.add('active');
        hideError();
      });
    });
    
    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.classList.add('show');
    }
    
    function hideError() {
      document.getElementById('error').classList.remove('show');
    }
    
    function setLoading(formId, loading) {
      document.getElementById(formId + '-loading').classList.toggle('show', loading);
      document.getElementById(formId + '-btn').disabled = loading;
    }
    
    // Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      setLoading('login', true);
      
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-password').value
          })
        });
        
        const data = await res.json();
        
        if (!res.ok) {
          throw new Error(data.error || 'Login failed');
        }
        
        // Set session cookie
        document.cookie = `session=${data.sessionId}; path=/; max-age=${7*24*60*60}`;
        
        // Redirect to dashboard
        window.location.href = '/dashboard.html';
      } catch(err) {
        showError(err.message);
      } finally {
        setLoading('login', false);
      }
    });
    
    // Signup
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      setLoading('signup', true);
      
      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('signup-email').value,
            password: document.getElementById('signup-password').value,
            restaurantName: document.getElementById('signup-restaurant').value
          })
        });
        
        const data = await res.json();
        
        if (!res.ok) {
          throw new Error(data.error || 'Signup failed');
        }
        
        // Set session cookie
        document.cookie = `session=${data.sessionId}; path=/; max-age=${7*24*60*60}`;
        
        // Redirect to dashboard
        window.location.href = '/dashboard.html';
      } catch(err) {
        showError(err.message);
      } finally {
        setLoading('signup', false);
      }
    });
  </script>
</body>
</html>
